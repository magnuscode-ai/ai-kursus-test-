<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnAI — AI som din digitale medstifter</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --amber-deep:  #78350F;
      --amber-glow:  #B45309;
      --amber-accent:#F59E0B;
      --text:        #FFFBEB;
      --text-soft:   rgba(255,251,235,0.75);
      --text-muted:  rgba(255,251,235,0.45);
      --bg:          #1C1007;
    }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
    body { animation: fadeIn 0.6s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .page-out { animation: fadeOut 0.5s ease forwards !important; }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-12px) scale(0.98); } }
    .bg-blobs { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .blob { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.4; }
    .blob-1 { width: 650px; height: 650px; background: radial-gradient(circle, #D97706 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); animation: blobFloat 9s ease-in-out infinite; }
    .blob-2 { width: 380px; height: 380px; background: radial-gradient(circle, #92400E 0%, transparent 70%); top: -80px; right: -40px; }
    .blob-3 { width: 280px; height: 280px; background: radial-gradient(circle, #451a03 0%, transparent 70%); bottom: 40px; left: -60px; }
    @keyframes blobFloat { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -52%) scale(1.06); } }
    .grid-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.04; background-image: linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px); background-size: 40px 40px; }
    .landing { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    .top-nav { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); font-weight: 700; font-size: 15px; }
    .nav-mark { width: 34px; height: 34px; border-radius: 10px; background: var(--amber-glow); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(245,158,11,0.35); }
    .nav-mark svg { width: 15px; height: 15px; fill: white; }
    .nav-pill { font-size: 12px; font-weight: 600; color: var(--amber-accent); background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25); padding: 5px 14px; border-radius: 999px; }
    .center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px 24px 80px; max-width: 700px; margin: 0 auto; width: 100%; }
    .badge { display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px; border-radius: 18px; background: linear-gradient(135deg, var(--amber-glow), #92400E); color: var(--text); font-size: 20px; font-weight: 800; margin-bottom: 28px; box-shadow: 0 0 40px rgba(217,119,6,0.5); }
    .eyebrow { font-size: 11.5px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; }
    .title { font-family: 'Playfair Display', serif; font-size: clamp(30px, 5.5vw, 52px); font-weight: 700; line-height: 1.15; margin-bottom: 20px; }
    .title em { font-style: italic; color: var(--amber-accent); }
    .subtitle { font-size: clamp(14px, 2vw, 16px); color: var(--text-soft); line-height: 1.75; margin-bottom: 16px; max-width: 540px; }
    .meta { font-size: 13px; color: var(--text-muted); margin-bottom: 36px; }
    .start-btn { display: inline-flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.95); color: var(--amber-deep); font-size: 15px; font-weight: 700; padding: 14px 30px; border-radius: 999px; text-decoration: none; transition: transform 0.18s, box-shadow 0.18s; box-shadow: 0 4px 24px rgba(0,0,0,0.25); }
    .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .start-btn svg { width: 15px; height: 15px; stroke: var(--amber-deep); stroke-width: 2.5; fill: none; }
  </style>
</head>
<body>
<div class="bg-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>
<div class="grid-overlay"></div>
<div class="landing">
  <nav class="top-nav">
    <a href="platform.html" class="nav-logo">
      <div class="nav-mark"><svg viewBox="0 0 16 16"><path d="M8 1L10 6H15L11 9.5L12.5 15L8 12L3.5 15L5 9.5L1 6H6Z"/></svg></div>
      LearnAI DK
    </a>
    <div class="nav-pill">Sidekursus · Iværksætteri</div>
  </nav>
  <main class="center">
    <div class="badge">I1</div>
    <p class="eyebrow">Sidekursus · Del 1 af 3</p>
    <h1 class="title">AI som din<br><em>digitale medstifter</em></h1>
    <p class="subtitle">Valider idéer, byg forretningsmodeller, pitch til investorer og automatiser drift — med AI som din sparringspartner hver dag.</p>
    <p class="meta">⏱ Ca. 2 timer · 8 moduler · Live pitch · Prompt-bibliotek</p>
    <a href="kursus-ivaerksaetteri.html" class="start-btn" id="startBtn">
      Begynd kurset
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </a>
  </main>
</div>
<script>
  document.getElementById('startBtn').addEventListener('click', function(e) {
    e.preventDefault();
    var dest = this.href;
    document.body.classList.add('page-out');
    setTimeout(function() { window.location.href = dest; }, 480);
  });
</script>
</body>
</html>
